<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - BrandBox</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .back-btn { text-decoration: none; color: #1d4e89; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        
        .product-card-detail { 
            display: flex; gap: 40px; background: white; padding: 30px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .img-side { flex: 1; text-align: center; }
        .img-side img { width: 100%; max-width: 400px; border-radius: 10px; height: auto; object-fit: contain; }
        
        .info-side { flex: 1; }
        .info-side h1 { font-size: 32px; margin-top: 0; color: #333; }
        .price-tag { font-size: 26px; color: #fe4c50; font-weight: bold; margin: 15px 0; }
        .desc-text { color: #555; line-height: 1.6; margin-bottom: 20px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        /* Color Selection Styling */
        .selector-label { font-weight: bold; margin-bottom: 10px; display: block; color: #333; }
        .color-options { display: flex; gap: 12px; margin-bottom: 20px; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2px solid #ddd; cursor: pointer; transition: 0.3s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: #000; box-shadow: 0 0 5px rgba(0,0,0,0.3); }

        /* Size Selection Styling */
        .size-options { display: flex; gap: 10px; margin-bottom: 25px; }
        .size-box {
            padding: 8px 15px; border: 1px solid #ddd; border-radius: 5px;
            cursor: pointer; font-weight: bold; transition: 0.3s; background: #fff;
        }
        .size-box:hover { border-color: #fe4c50; color: #fe4c50; }
        .size-box.active { background: #fe4c50; color: #fff; border-color: #fe4c50; }

        .buy-btn { 
            background: #000; color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; transition: 0.3s;
        }
        .buy-btn:hover { background: #1d4e89; }

        @media (max-width: 768px) { .product-card-detail { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <a href="Home.html" class="back-btn">← Back to Shopping</a>
    
    <div class="product-card-detail" id="mainArea">
        <p>Loading Product Information...</p>
    </div>
</div>

<script>
    window.onload = function() {
        const name = localStorage.getItem("pName");
        const price = localStorage.getItem("pPrice");
        const image = localStorage.getItem("pImage");
        const desc = localStorage.getItem("pDesc");

        const area = document.getElementById("mainArea");

        if (name && image) {
            const cleanImage = image.split('?')[0]; 
            const freshImage = cleanImage + "?t=" + new Date().getTime();

            area.innerHTML = `
                <div class="img-side">
                    <img src="${freshImage}" alt="${name}">
                </div>
                <div class="info-side">
                    <h1>${name}</h1>
                    <div class="price-tag">₹${price}</div>
                    <p class="desc-text">${desc || "Premium quality product designed for style and comfort."}</p>
                    
                    <span class="selector-label">Select Color:</span>
                    <div class="color-options">
                        <div class="color-dot" style="background: #000;" onclick="selectOption(this, 'color', 'Black')"></div>
                        <div class="color-dot" style="background: #fe4c50;" onclick="selectOption(this, 'color', 'Red')"></div>
                        <div class="color-dot" style="background: #fff;" onclick="selectOption(this, 'color', 'White')"></div>
                        <div class="color-dot" style="background: #1d4e89;" onclick="selectOption(this, 'color', 'Blue')"></div>
                    </div>

                    <span class="selector-label">Select Size:</span>
                    <div class="size-options">
                        <div class="size-box" onclick="selectOption(this, 'size', 'S')">S</div>
                        <div class="size-box" onclick="selectOption(this, 'size', 'M')">M</div>
                        <div class="size-box" onclick="selectOption(this, 'size', 'L')">L</div>
                        <div class="size-box" onclick="selectOption(this, 'size', 'XL')">XL</div>
                    </div>

                    <button class="buy-btn" onclick="addToCartNow()">Add to Cart 🛒</button>
                    <p id="selectionHint" style="margin-top:10px; font-size:13px; color: #888;"></p>
                </div>
            `;
        } else {
            area.innerHTML = "<h2>Product not found! Please go back to Home.</h2>";
        }
    }

    // Function to handle Color and Size selection
    function selectOption(element, type, value) {
        // Remove active class from others in the same group
        const selector = type === 'color' ? '.color-dot' : '.size-box';
        document.querySelectorAll(selector).forEach(el => el.classList.remove('active'));
        
        // Add active class to clicked element
        element.classList.add('active');
        
        // Store in localStorage for the cart
        localStorage.setItem("selected" + type.charAt(0).toUpperCase() + type.slice(1), value);
        
        document.getElementById('selectionHint').innerText = "Selected " + type + ": " + value;
    }

    function addToCartNow() {
        const name = localStorage.getItem("pName");
        const price = localStorage.getItem("pPrice");
        const image = localStorage.getItem("pImage");
        const color = localStorage.getItem("selectedColor") || "Default";
        const size = localStorage.getItem("selectedSize") || "M";

        if (!name) return;

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        // Adding color and size to the cart item
        cart.push({ name, price, image, color, size });
        localStorage.setItem("cart", JSON.stringify(cart));

        alert(`${name} (${size}, ${color}) added to cart! ✅`);
        window.location.href = "Cart.html";
    }
</script>

</body>
</html>
