<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment - BrandBox</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
    /* CSS: Payment Page Styling */
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .payment-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
    
    h2 { color: #333; margin-bottom: 20px; }
    .amount-box { background: #eef2f7; padding: 15px; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #28a745; }
    
    /* New QR Section Styling */
    .qr-box { background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 20px; }
    .qr-box img { width: 180px; height: 180px; margin-top: 10px; }
    .divider { margin: 15px 0; color: #888; font-size: 14px; position: relative; }
    .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #ddd; }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .pay-option { margin-bottom: 15px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: left; }
    input[type="text"] { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    
    .pay-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .pay-btn:hover { background: #0056b3; }
    
    /* Success Message Styling */
    #successBox { display: none; }
    .order-id-display { font-size: 24px; color: #007bff; font-weight: bold; margin: 15px 0; padding: 10px; border: 2px dashed #007bff; display: inline-block; }
    .home-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: black; color: white; text-decoration: none; border-radius: 5px; }
</style>
</head>
<body>

<div class="payment-card">
    <div id="paymentArea">
        <h2>💳 Secure Checkout</h2>
        <div class="amount-box" id="displayTotal">Total Payable: ₹0</div>

        <div class="qr-box">
            <label><strong>Option 1: Scan QR to Pay</strong></label><br>
            <img src="" id="qrDisplay" alt="Payment QR Code">
            <p style="font-size: 12px; color: #666; margin-top: 5px;">Scan using Google Pay, PhonePe or Paytm</p>
        </div>

        <div class="divider">OR</div>

        <div class="pay-option">
            <label><strong>Option 2: Enter UPI ID Manually</strong></label>
            <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. pratap@okaxis)">
        </div>

        <button class="pay-btn" onclick="processPayment()">Confirm & Pay Now</button>
    </div>

    <div id="successBox">
        <h2 style="color: #28a745;">🎉 Payment Successful!</h2>
        <p>Thank you for shopping with BrandBox. Your order has been placed.</p>
        <p style="margin-top: 15px;"><strong>Your Order ID is:</strong></p>
        <div class="order-id-display" id="finalOrderID">BX000000</div>
        <p style="color: #666; font-size: 14px;">Please save this ID to track your order.</p>
        <a href="home.html" class="home-btn">Go to Home</a>
    </div>
</div>

<script>
/** * STEP 1: FIREBASE CONFIGURATION */
const firebaseConfig = {
    apiKey: "AIzaSyAmqyEPpanrmKD7rDz0aA6M_Un0bGFnevk",
    authDomain: "brandbox-11fb7.firebaseapp.com",
    projectId: "brandbox-11fb7",
    storageBucket: "brandbox-11fb7.firebasestorage.app",
    messagingSenderId: "214410646376",
    appId: "1:214410646376:web:e8cd435ecd821dccec7cdd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Get data from LocalStorage
const totalAmount = localStorage.getItem("finalBill") || 0;
const pendingOrder = JSON.parse(localStorage.getItem("pendingOrder"));

// Update Display Amount
document.getElementById("displayTotal").innerText = "Total Payable: ₹" + totalAmount;

// English Comment: Generate QR Code dynamically using totalAmount
// Replace 'yourvpa@upi' with your real UPI ID if testing for real payments
const upiID = "pratap@okaxis"; 
const qrImg = document.getElementById("qrDisplay");
const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upiID}&pn=BrandBox&am=${totalAmount}&cu=INR`;
qrImg.src = qrApiUrl;

/** * STEP 2: PROCESS PAYMENT FUNCTION */
function processPayment() {
    const payBtn = document.querySelector(".pay-btn");
    payBtn.innerText = "Verifying Payment... ⏳";
    payBtn.disabled = true;

    // Simulate payment verification
    setTimeout(() => {
        db.collection("orders").add({
            ...pendingOrder,
            payment_status: "Paid",
            order_date: new Date().toLocaleString(),
            status: "Confirmed"
        })
        .then(() => {
            document.getElementById("paymentArea").style.display = "none";
            document.getElementById("successBox").style.display = "block";
            document.getElementById("finalOrderID").innerText = pendingOrder.order_id;

            // Cleanup
            localStorage.removeItem("cart");
            localStorage.removeItem("pendingOrder");
            localStorage.removeItem("finalBill");
        })
        .catch((error) => {
            console.error("Error: ", error);
            alert("Payment failed. Please try again.");
            payBtn.innerText = "Confirm & Pay Now";
            payBtn.disabled = false;
        });
    }, 2000);
}
</script>

</body>
</html>
