<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Collection - BrandBox</title>

    <style>
        /* --- General Layout Styles --- */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f9f9f9; 
            margin: 0; 
            padding: 0; 
        }

        .container { 
            max-width: 1400px; 
            margin: auto; 
            padding: 20px; 
        }

        /* Header Styling */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: white; 
            border-bottom: 1px solid #ddd; 
            border-radius: 8px; 
        }

        .logo { 
            font-weight: bold; 
            font-size: 24px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer; 
        }
        .logo span { color: #fe4c50; }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        /* Product Card Styling */
        .card { 
            background: white; 
            padding: 15px; 
            text-align: center; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }

        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: contain; 
            border-radius: 8px; 
            background: #fdfdfd;
            padding: 10px;
        }

        .card h4 { font-size: 15px; margin: 12px 0 5px; color: #333; }
        .price { color: #fe4c50; font-size: 17px; font-weight: bold; margin: 5px 0; }

        button {
            padding: 10px; 
            width: 100%; 
            background: black; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px;
            margin-top: 10px; 
            font-weight: bold; 
            transition: 0.2s;
        }

        button:hover { background: #fe4c50; }

        .cart-container { 
            cursor: pointer; 
            display: inline-block; 
            position: relative; 
            font-size: 22px; 
            margin-left: 15px; 
        }
        .cart-container span { 
            background: red; 
            color: white; 
            border-radius: 50%; 
            padding: 2px 6px; 
            font-size: 12px; 
            position: absolute; 
            top: -8px; 
            right: -10px; 
        }

        h3 { 
            margin-top: 30px; 
            font-size: 24px; 
            color: #1e1e27; 
            border-left: 5px solid #fe4c50; 
            padding-left: 15px; 
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2 onclick="goToHome()" style="cursor:pointer">Brand<span>Box</span></h2>
        <div style="display:flex; align-items:center;">
            <button onclick="goToHome()" style="width:auto; margin-top:0; margin-right:10px; padding: 8px 20px;">Home</button>
            <div class="cart-container" onclick="goToCart()">🛒 <span id="count">0</span></div>
        </div>
    </div>

    <h3>Men's Clothing Collection (Product Only)</h3>

    <div class="grid" id="productGrid"></div>
</div>

<script>
    // 25 Products Array with individual 'desc' (Description) for each item
    const products = [
        { name: "Premium White Tee (Hanger)", price: 599, img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500", desc: "A classic men's white t-shirt made from 100% organic cotton. Lightweight and breathable for summer comfort." },
        { name: "Blue Oxford Shirt (Hanger)", price: 999, img: "https://images.unsplash.com/photo-1589310243389-96a5483213a8?w=500", desc: "Professional blue oxford shirt with a crisp collar. Perfect for office wear or formal events." },
        { name: "Classic Denim Jeans (Flat)", price: 1499, img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500", desc: "Durable blue denim jeans with a straight-leg fit. Features a timeless look with reinforced stitching." },
        { name: "Grey Hoodie (Flat Lay)", price: 1299, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500", desc: "Cozy grey fleece hoodie. Features a soft inner lining and a front pouch pocket for extra warmth." },
        { name: "Black Leather Jacket (Hanger)", price: 2999, img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500", desc: "Premium men's biker jacket in sleek black faux leather. A bold statement piece for any wardrobe." },
        { name: "Navy Blazer (Hanger)", price: 3499, img: "https://media.istockphoto.com/id/688210502/photo/suit-style.jpg?s=1024x1024&w=is&k=20&c=heNTBTCx6elwf_-CN8MFCzJi-6qekz3ulxwbltfzL8M=", desc: "Sophisticated navy blue blazer. Ideal for smart-casual outings or semi-formal business meetings." },
        { name: "Cargo Shorts (Flat)", price: 799, img: "https://images.unsplash.com/photo-1591195853828-11db59a44f6b?w=500", desc: "Rugged cargo shorts with multiple utility pockets. Perfect for hiking or casual weekend wear." },
        { name: "Graphic T-Shirt (Flat)", price: 699, img: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500", desc: "Stylish black graphic tee with a modern artistic print. High-quality screen printing that lasts." },
        { name: "Beige Chinos (Flat)", price: 1299, img: "https://images.unsplash.com/photo-1711443813147-def27861b9af?q=80&w=1964&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", desc: "Versatile beige chinos with a slim fit. A wardrobe essential that pairs well with both shirts and tees." },
        { name: "Olive Puffer Vest (Hanger)", price: 1899, img: "https://images.unsplash.com/photo-1715607096614-6da1f59f04f1?q=80&w=685&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", desc: "Lightweight olive green puffer vest. Great for layering during autumn or spring transitions." },
        { name: "Linen Summer Shirt (Hanger)", price: 1199, img: "https://images.unsplash.com/photo-1713881842156-3d9ef36418cc?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", desc: "Breathable linen-blend shirt for hot summer days. Offers a relaxed fit with a cool, airy feel." },
        { name: "Grey Joggers (Flat)", price: 899, img: "https://media.istockphoto.com/id/1406303920/photo/womens-sweatpants-sport.jpg?s=1024x1024&w=is&k=20&c=ldGWRr1rehqR4g8GrMfFb_lyT_0iwz-6VFB45qUah0A=", desc: "Comfortable fleece joggers with an elastic waistband. Perfect for gym sessions or lounging at home." },
        { name: "Checkered Flannel (Hanger)", price: 1099, img: "https://images.unsplash.com/photo-1611312449412-6cefac5dc3e4?w=500", desc: "Classic red and black checkered flannel shirt. Durable material with a soft-brushed finish." },
        { name: "Trench Coat (Hanger)", price: 4500, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500", desc: "Elegant long trench coat in khaki. Provides a formal look while protecting you from wind and light rain." },
        { name: "Knit Sweater (Flat Lay)", price: 1399, img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500", desc: "Warm knitted crewneck sweater. Features a textured design that adds a touch of style to winter wear." },
        { name: "Denim Trucker (Hanger)", price: 2199, img: "https://images.unsplash.com/photo-1616150638538-ffb0679a3fc4?w=500", desc: "Classic blue denim trucker jacket. A vintage-inspired outer layer that never goes out of fashion." },
        { name: "Striped Polo (Hanger)", price: 850, img: "https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?w=500", desc: "Sporty striped polo shirt. Features a ribbed collar and cuffs for a neat, athletic appearance." },
        { name: "Black Formal Pants (Flat)", price: 1599, img: "https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=500", desc: "Crisp black formal trousers. Designed with a slim-fit cut for a modern professional look." },
        { name: "Puffer Jacket (Hanger)", price: 3999, img: "https://images.unsplash.com/photo-1706765779533-6c0210fab380?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D", desc: "Thick insulated puffer jacket for extreme cold. Water-resistant outer shell with a warm down-fill." },
        { name: "Slim Denim Shirt (Hanger)", price: 1200, img: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500", desc: "Lightweight denim shirt with a slim-fit profile. Ideal for layering over t-shirts in casual settings." },
        { name: "Camo Cargo Pants (Flat)", price: 1350, img: "https://images.unsplash.com/photo-1622519407650-3df9883f76a5?w=500", desc: "Camouflage print cargo pants. Rugged design with reinforced knees for outdoor activities." },
        { name: "Varsity Jacket (Hanger)", price: 2600, img: "https://images.unsplash.com/photo-1617137968427-85924c800a22?w=500", desc: "Retro-style varsity jacket with contrast sleeves. High-quality cotton blend with embroidered details." },
        { name: "Cotton Tank Top (Flat)", price: 450, img: "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=500", desc: "Basic white cotton tank top. Perfect as an undershirt or for workout sessions at the gym." },
        { name: "White Formal Shirt (Hanger)", price: 1450, img: "https://media.istockphoto.com/id/531374975/photo/white-shirt-with-tie-for-businessman.jpg?s=1024x1024&w=is&k=20&c=i664mfWjGp5-bP6UP1SuNaTW8wY4gbBfvmK9nPyqzbY=", desc: "Premium white dress shirt for formal occasions. Made with easy-iron fabric for a sharp look all day." },
        { name: "Wool Overcoat (Hanger)", price: 5200, img: "https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=500", desc: "Luxury wool-blend overcoat. A long, tailored coat that provides maximum warmth and elegance." }
    ];

    const productGrid = document.getElementById('productGrid');

    // Function to render products dynamically
    function renderProducts() {
        products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.className = 'card';
            // Click on image/text now passes 'product.desc' as well
            productCard.innerHTML = `
                <div onclick="openDetails('${product.name}', ${product.price}, '${product.img}', '${product.desc}')" style="cursor:pointer">
                    <img src="${product.img}" alt="${product.name}">
                    <h4>${product.name}</h4>
                    <p class="price">₹${product.price.toLocaleString()}</p>
                </div>
                <button onclick="addToCart('${product.name}', ${product.price}, '${product.img}')">Add to Cart</button>
            `;
            productGrid.appendChild(productCard);
        });
    }

    // Stores selected product AND its description in LocalStorage
    function openDetails(name, price, img, desc) {
        const selectedProduct = { name, price, img, desc };
        localStorage.setItem("selectedProduct", JSON.stringify(selectedProduct));
        window.location.href = "ProductDetails.html";
    }

    function addToCart(name, price, image){
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({name, price, image});
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCount();
        alert(name + " added to cart!");
    }

    function updateCount(){
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        document.getElementById("count").innerText = cart.length;
    }

    function goToHome(){ window.location.href="Home.html"; }
    function goToCart(){ window.location.href="Cart.html"; }

    window.onload = () => {
        renderProducts();
        updateCount();
    };
</script>

</body>
</html>
