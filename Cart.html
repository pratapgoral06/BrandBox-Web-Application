<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart - BrandBox</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* Styling for a Professional E-commerce Look */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body { background: linear-gradient(135deg, #e6eef5, #f4efe6); min-height: 100vh; }
.container { max-width:900px; margin:auto; padding:25px; }
h2 { margin-bottom:20px; color: #333; }
.cart-item { display:flex; gap:15px; background:white; padding:15px; border-radius:15px; margin-bottom:15px; align-items:center; flex-wrap:wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.cart-item img { width:100px; height:100px; object-fit:cover; border-radius:10px; }
.details { flex:1; }
.details h4 { margin-bottom:5px; color: #444; }
.details p { font-weight:bold; color:#1d4e89; font-size: 1.1rem; }
.remove-btn { padding:8px 12px; border:none; background:#ff4d4d; color:white; border-radius:8px; cursor:pointer; transition: 0.3s; }
.remove-btn:hover { background:darkred; }
.total { margin-top:20px; font-size:22px; font-weight:bold; text-align: right; color: #222; border-top: 2px solid #ddd; padding-top: 15px; }
.checkout { margin-top:15px; padding:15px; width:100%; background:black; color:white; border:none; border-radius:10px; font-size:18px; font-weight: bold; cursor:pointer; transition: 0.3s; }
.checkout:hover { background:#333; transform: translateY(-2px); }
.continue { margin-top:10px; padding:12px; width:100%; background:#f0f0f0; color:#333; border-radius:10px; font-size:16px; cursor:pointer; text-align:center; border:1px solid #ccc; display: block; text-decoration: none; }
</style>

</head>
<body>

<div class="container">
    <h2>🛒 My Cart</h2>
    <div id="cartItems"></div>
    <div class="total" id="total">Total: ₹0</div>
    
    <button class="checkout" onclick="proceedToPayment()">Proceed to Checkout</button>
    <a href="Home.html" class="continue">Continue Shopping</a>
</div>

<script>
/** * GLOBAL VARIABLES */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartItems");
let totalDisplay = document.getElementById("total");
let totalPrice = 0;

/** * STEP 1: LOAD CART FUNCTION 
 * Fixed: Using Number() to ensure price calculation is mathematical and not text joining.
 */
function loadCart() {
    container.innerHTML = ""; 
    totalPrice = 0; 

    if(cart.length === 0) {
        container.innerHTML = "<div style='text-align:center; padding:50px;'><h3>Your cart is empty 😢</h3></div>";
        totalDisplay.innerText = "Total: ₹0";
        return;
    }

    cart.forEach((item, index) => {
        // Ensure price is treated as a number
        let itemPrice = Number(item.price); 
        totalPrice += itemPrice;

        container.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="details">
                    <h4>${item.name}</h4>
                    <p>₹${itemPrice.toLocaleString()}</p>
                </div>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });
    totalDisplay.innerText = "Total Amount: ₹" + totalPrice.toLocaleString();
}

/** * STEP 2: REMOVE ITEM FUNCTION */
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/** * STEP 3: PROCEED TO PAYMENT */
function proceedToPayment() {
    if (cart.length === 0) {
        alert("Please add items to your cart first!");
        return;
    }

    const pendingOrder = {
        order_id: "BX" + Math.floor(100000 + Math.random() * 900000),
        items: cart,
        total_amount: totalPrice,
        customer_name: "Pratap Goral", 
        status: "Pending Payment"
    };

    localStorage.setItem("pendingOrder", JSON.stringify(pendingOrder));
    localStorage.setItem("finalBill", totalPrice);

    window.location.href = "Payment.html";
}

// Initial call
loadCart();
</script>

</body>
</html>
