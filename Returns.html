<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returns & Refunds - BrandBox</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
    /* CSS: Layout and Form Styling */
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    
    h2 { color: #333; text-align: center; margin-bottom: 10px; }
    p.subtitle { text-align: center; color: #777; font-size: 14px; margin-bottom: 30px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
    input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    
    textarea { height: 100px; resize: none; }
    
    .submit-btn { width: 100%; padding: 14px; background: #dc3545; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .submit-btn:hover { background: #c82333; }
    
    .policy-box { margin-top: 30px; padding: 15px; background: #fff3cd; border-left: 5px solid #ffc107; border-radius: 5px; font-size: 13px; color: #856404; }
    .back-home { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; }
</style>
</head>
<body>

<div class="container">
    <h2>📦 Returns & Refunds</h2>
    <p class="subtitle">Please fill the details below to initiate a return.</p>

    <form id="returnForm">
        <div class="form-group">
            <label>Order ID (e.g. BX123456)</label>
            <input type="text" id="orderId" placeholder="Enter your Order ID" required>
        </div>

        <div class="form-group">
            <label>Reason for Return</label>
            <select id="reason" required>
                <option value="">Select a reason</option>
                <option value="Wrong Size">Wrong Size</option>
                <option value="Damaged Product">Damaged Product</option>
                <option value="Different from Image">Different from Image</option>
                <option value="Quality Issue">Quality Issue</option>
            </select>
        </div>

        <div class="form-group">
            <label>Additional Comments</label>
            <textarea id="comments" placeholder="Tell us more about the issue..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Return Request</button>
    </form>

    <div class="policy-box">
        <strong>Note:</strong> Returns are only accepted within 7 days of delivery. The product must be in its original condition with tags.
    </div>

    <a href="home.html" class="back-home">Return to Home</a>
</div>

<script>
/** * STEP 1: FIREBASE CONFIGURATION */
const firebaseConfig = {
    apiKey: "AIzaSyAmqyEPpanrmKD7rDz0aA6M_Un0bGFnevk",
    authDomain: "brandbox-11fb7.firebaseapp.com",
    projectId: "brandbox-11fb7",
    storageBucket: "brandbox-11fb7.firebasestorage.app",
    messagingSenderId: "214410646376",
    appId: "1:214410646376:web:e8cd435ecd821dccec7cdd"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/** * STEP 2: HANDLE FORM SUBMISSION */
document.getElementById("returnForm").addEventListener("submit", function(e) {
    e.preventDefault(); // Prevent page refresh

    // Get values from form
    const orderId = document.getElementById("orderId").value.trim();
    const reason = document.getElementById("reason").value;
    const comments = document.getElementById("comments").value;

    // Save to "returns" collection in Firestore
    db.collection("returns").add({
        order_id: orderId,
        return_reason: reason,
        user_comments: comments,
        request_date: new Date().toLocaleString(),
        status: "Pending Review"
    })
    .then(() => {
        alert("✅ Your return request has been submitted successfully!");
        document.getElementById("returnForm").reset(); // Clear form
    })
    .catch((error) => {
        console.error("Error submitting return: ", error);
        alert("Something went wrong. Please try again.");
    });
});
</script>

</body>
</html>
