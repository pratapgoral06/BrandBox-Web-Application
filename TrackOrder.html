<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track & Cancel Order - BrandBox</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
    /* CSS: UI Styling */
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .track-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
    
    h2 { color: #333; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
    
    .track-btn { width: 100%; padding: 12px; background: black; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    
    /* Result Box Styling */
    #orderResult { margin-top: 25px; padding: 20px; border-radius: 10px; background: #f9f9f9; display: none; text-align: left; border: 1px solid #eee; position: relative; }
    .status-text { font-weight: bold; color: #007bff; }
    .cancelled { color: #dc3545 !important; } /* Red color for cancelled status */

    /* Cancel Button Styling */
    .cancel-btn { margin-top: 15px; width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
    .cancel-btn:hover { background: #c82333; }
    
    .back-link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>

<div class="track-card">
    <h2>🚚 Track Your Order</h2>
    <input type="text" id="orderInput" placeholder="Enter Order ID (e.g. BX123456)">
    <button class="track-btn" onclick="trackMyOrder()">Track Now</button>

    <div id="orderResult">
        <h4 id="resID">Order ID: #</h4>
        <p>Current Status: <span id="resStatus" class="status-text"></span></p>
        <div id="resDetails" style="font-size: 14px; color: #555;"></div>
        
        <button id="cancelBtn" class="cancel-btn" onclick="cancelOrder()">❌ Cancel This Order</button>
    </div>

    <a href="home.html" class="back-link">← Back to Home</a>
</div>

<script>
/** * STEP 1: FIREBASE CONFIGURATION */
const firebaseConfig = {
    apiKey: "AIzaSyAmqyEPpanrmKD7rDz0aA6M_Un0bGFnevk",
    authDomain: "brandbox-11fb7.firebaseapp.com",
    projectId: "brandbox-11fb7",
    storageBucket: "brandbox-11fb7.firebasestorage.app",
    messagingSenderId: "214410646376",
    appId: "1:214410646376:web:e8cd435ecd821dccec7cdd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentDocId = ""; // Variable to store the internal Firebase Document ID

/** * STEP 2: TRACK ORDER FUNCTION */
function trackMyOrder() {
    const orderIdInput = document.getElementById("orderInput").value.trim();
    const resultBox = document.getElementById("orderResult");
    const cancelBtn = document.getElementById("cancelBtn");

    if (orderIdInput === "") { alert("Please enter Order ID!"); return; }

    db.collection("orders").where("order_id", "==", orderIdInput).get()
    .then((querySnapshot) => {
        if (querySnapshot.empty) {
            alert("Order ID not found!");
            resultBox.style.display = "none";
        } else {
            querySnapshot.forEach((doc) => {
                currentDocId = doc.id; // Store the ID for updating later
                const order = doc.data();
                
                resultBox.style.display = "block";
                document.getElementById("resID").innerText = "Order ID: #" + order.order_id;
                document.getElementById("resStatus").innerText = order.status;
                
                // If order is already cancelled, hide the cancel button
                if (order.status === "Cancelled") {
                    document.getElementById("resStatus").classList.add("cancelled");
                    cancelBtn.style.display = "none";
                } else {
                    document.getElementById("resStatus").classList.remove("cancelled");
                    cancelBtn.style.display = "block";
                }

                document.getElementById("resDetails").innerHTML = `
                    <strong>Customer:</strong> ${order.customer_name} <br>
                    <strong>Total:</strong> ₹${order.total_amount}
                `;
            });
        }
    });
}

/** * STEP 3: CANCEL ORDER FUNCTION
 * Updates the 'status' field in Firestore to 'Cancelled'
 */
function cancelOrder() {
    if (!currentDocId) return;

    if (confirm("Are you sure you want to cancel this order?")) {
        // Update the status in Firebase
        db.collection("orders").doc(currentDocId).update({
            status: "Cancelled"
        })
        .then(() => {
            alert("✅ Order has been cancelled successfully!");
            trackMyOrder(); // Refresh the status on screen
        })
        .catch((error) => {
            console.error("Error cancelling order: ", error);
            alert("Failed to cancel order.");
        });
    }
}
</script>

</body>
</html>
