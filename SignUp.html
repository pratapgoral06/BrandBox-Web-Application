<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBox Signup</title>
    <link rel="stylesheet" href="LoginPage.css">
</head>
<body>

<div class="main">

    <div class="login-card">

        <!-- Logo -->
        <img src="Logo.png" alt="BrandBox Logo" class="logo">

        <h2>Create Account</h2>
        <p>Join BrandBox today</p>

        <form id="signupForm">

            <div class="input-box">
                <input type="text" id="name" required>
                <label>Full Name</label>
            </div>

            <div class="input-box">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="password" id="password" required>
                <label>Password</label>
                <span class="toggle" onclick="togglePassword()">👁</span>
            </div>

            <button type="submit" class="btn">SIGN UP</button>

        </form>

        <div class="signup">
            Already have an account? <a href="LoginPage.html">Login</a>
        </div>

    </div>

</div>

<script src="SignUp.js.js"></script>
</body>
</html>
